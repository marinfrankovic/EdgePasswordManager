services:
  edge-pass-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: mfrankovic/edge-password-manager:latest
    container_name: edge-pass-manager
    ports:
      - "${HOST_PORT:-8088}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      EdgePassManager__EdgeDataRoots__0__Channel: "Stable"
      EdgePassManager__EdgeDataRoots__0__Path: "/edge-data"
      EdgePassManager__BackupPath: "/data/backups"
      EdgePassManager__ExportPath: "/data/exports"
      EdgePassManager__LogPath: "/data/logs"
      EdgePassManager__WorkPath: "/tmp/edgepassmanager"
      EdgePassManager__ListDirectory: "/data/lists"
      EdgePassManager__AutoRefreshEnabled: "true"
      EdgePassManager__RefreshIntervalHours: "24"
      EdgePassManager__LargeDeleteThreshold: "25"
      EdgePassManager__ReadOnlyMode: "${READ_ONLY:-false}"
    volumes:
      # Bind-mount your Edge "User Data" directory. Mount read-write for delete/restore,
      # or append ":ro" for pure preview. Path comes from the .env file.
      - "${EDGE_USER_DATA}:/edge-data"
      # Persisted app artifacts on the host.
      - ./data/backups:/data/backups
      - ./data/exports:/data/exports
      - ./data/logs:/data/logs
      - ./data/lists:/data/lists
    restart: unless-stopped
