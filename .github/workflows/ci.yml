name: Build and test

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EdgePasswordBulkManager.sln

      - name: Build
        run: dotnet build EdgePasswordBulkManager.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test EdgePasswordBulkManager.sln --configuration Release --no-build

      - name: Audit NuGet packages
        run: dotnet list EdgePasswordBulkManager.sln package --vulnerable --include-transitive